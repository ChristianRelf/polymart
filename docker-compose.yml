services:

  # ── MySQL database ─────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: polymart-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: polymart
      MYSQL_USER: polymart
      MYSQL_PASSWORD: ${DB_PASSWORD:-polymart_password}
    ports:
      - "${DB_PORT_EXTERNAL:-3306}:3306"
    volumes:
      # Persist database data across restarts
      - polymart-db-data:/var/lib/mysql
      # Run schema on first start
      - ./server/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      # Enable event scheduler for 7-day purge
      - ./mysql-config/polymart.cnf:/etc/mysql/conf.d/polymart.cnf:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u polymart -p$$MYSQL_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s

  # ── Node API + simulation server ───────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY}
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY}
    container_name: polymart-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: polymart
      DB_PASSWORD: ${DB_PASSWORD:-polymart_password}
      DB_NAME: polymart
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PREMIUM_PRICE_ID: ${STRIPE_PREMIUM_PRICE_ID}
      APP_URL: ${APP_URL:-http://localhost:5173}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL:-support@polymart.co}
      RESEND_API_KEY: ${RESEND_API_KEY}
    ports:
      - "${APP_PORT:-4000}:4000"

volumes:
  polymart-db-data:
    driver: local
